<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 영단어장</title>
    <style>
        :root {
            --bg: #f6f7fb;
            --surface: #ffffff;
            --surface-soft: #f9fafc;
            --text: #172033;
            --muted: #677084;
            --line: #dfe4ee;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --danger: #dc2626;
            --danger-dark: #b91c1c;
            --success: #16a34a;
            --shadow: 0 18px 45px rgba(23, 32, 51, 0.1);
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 32px 18px;
            background:
                linear-gradient(180deg, rgba(37, 99, 235, 0.08), rgba(37, 99, 235, 0) 260px),
                var(--bg);
            color: var(--text);
            font-family: Arial, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
        }

        main {
            width: min(1040px, 100%);
            margin: 0 auto;
        }

        .app-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 22px;
        }

        .app-title {
            margin: 0;
            font-size: clamp(28px, 5vw, 44px);
            line-height: 1.1;
            letter-spacing: 0;
        }

        .app-subtitle {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 15px;
        }

        .panel {
            margin-top: 18px;
            padding: 22px;
            background: var(--surface);
            border: 1px solid rgba(223, 228, 238, 0.9);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 18px;
        }

        h2 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .form-grid textarea {
            grid-column: 1 / -1;
            min-height: 92px;
            resize: vertical;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px 13px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: var(--surface-soft);
            color: var(--text);
            font: inherit;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
        }

        input:focus,
        textarea:focus {
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        button {
            min-height: 40px;
            padding: 0 14px;
            border: 0;
            border-radius: 6px;
            background: var(--primary);
            color: #ffffff;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.12s ease, background-color 0.12s ease, box-shadow 0.12s ease;
        }

        button:hover {
            background: var(--primary-dark);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.18);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .secondary-button {
            background: #eef2ff;
            color: #1e3a8a;
        }

        .secondary-button:hover {
            background: #dbeafe;
            box-shadow: none;
        }

        .danger-button {
            background: var(--danger);
        }

        .danger-button:hover {
            background: var(--danger-dark);
            box-shadow: 0 8px 18px rgba(220, 38, 38, 0.18);
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: var(--radius);
        }

        table {
            width: 100%;
            min-width: 820px;
            border-collapse: collapse;
            background: var(--surface);
        }

        th,
        td {
            padding: 13px 12px;
            border-bottom: 1px solid var(--line);
            text-align: center;
            vertical-align: middle;
        }

        th {
            background: #f1f5f9;
            color: #334155;
            font-size: 13px;
            font-weight: 800;
        }

        td {
            color: #263246;
            font-size: 14px;
        }

        tbody tr:last-child td {
            border-bottom: 0;
        }

        tbody tr:hover {
            background: #f8fbff;
        }

        tbody tr.memorized td {
            color: var(--muted);
            background: #f7f8fa;
            text-decoration: line-through;
        }

        .empty-row td {
            padding: 34px 12px;
            color: var(--muted);
            text-decoration: none;
        }

        .row-actions {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .row-actions button {
            min-height: 34px;
            padding: 0 10px;
            font-size: 13px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--success);
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 720px) {
            body {
                padding: 22px 12px;
            }

            .app-header,
            .panel-header {
                align-items: flex-start;
                flex-direction: column;
            }

            .panel {
                padding: 18px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            button {
                width: 100%;
            }

            .row-actions {
                min-width: 132px;
            }
        }
    </style>
</head>
<body>
    <main>
        <header class="app-header">
            <div>
                <h1 class="app-title">나만의 영단어장</h1>
                <p class="app-subtitle">새 단어를 기록하고 외운 단어를 체크하세요.</p>
            </div>
        </header>

        <section id="addWord" class="panel">
            <div class="panel-header">
                <h2>단어 추가</h2>
            </div>
            <div class="form-grid">
                <input type="text" id="newWord" placeholder="영어 단어">
                <input type="text" id="newMeaning" placeholder="뜻">
                <textarea id="newExample" rows="3" placeholder="예문 선택 입력"></textarea>
            </div>
            <div class="actions">
                <button onclick="addWord()">추가</button>
            </div>
        </section>

        <section id="editWord" class="panel" style="display: none;">
            <div class="panel-header">
                <h2>단어 수정</h2>
            </div>
            <input type="hidden" id="editIndex">
            <div class="form-grid">
                <input type="text" id="editWordInput" placeholder="영어 단어">
                <input type="text" id="editMeaningInput" placeholder="뜻">
                <textarea id="editExampleInput" rows="3" placeholder="예문 선택 입력"></textarea>
            </div>
            <div class="actions">
                <button onclick="saveEditedWord()">저장</button>
                <button class="secondary-button" onclick="cancelEdit()">취소</button>
            </div>
        </section>

        <section id="wordList" class="panel">
            <div class="panel-header">
                <h2>저장된 단어 목록</h2>
                <button class="secondary-button" onclick="toggleMemorized()">외운 단어 보이기/숨기기</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>외움</th>
                            <th>No</th>
                            <th>날짜</th>
                            <th>영어 단어</th>
                            <th>뜻</th>
                            <th>예문</th>
                            <th>작업</th>
                        </tr>
                    </thead>
                    <tbody id="words"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAr2QEeqVDpfJdmSBnC5a_mO1qMpoC9cec",
            authDomain: "english-test-f4df6.firebaseapp.com",
            projectId: "english-test-f4df6",
            storageBucket: "english-test-f4df6.appspot.com",
            messagingSenderId: "30084236062",
            appId: "1:30084236062:web:58d1ce54213de789c73f0f",
            measurementId: "G-KY6RH80E4X",
            databaseURL: "https://english-test-f4df6-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const wordsRef = ref(database, 'words');

        function addWord() {
            var newWord = document.getElementById('newWord').value.trim();
            var newMeaning = document.getElementById('newMeaning').value.trim();
            var newExample = document.getElementById('newExample').value.trim();

            if (newWord && newMeaning) {
                var currentDate = getCurrentDate();
                var wordItem = {
                    date: currentDate,
                    word: newWord,
                    meaning: newMeaning,
                    example: newExample,
                    memorized: false
                };

                push(wordsRef, wordItem);

                document.getElementById('newWord').value = '';
                document.getElementById('newMeaning').value = '';
                document.getElementById('newExample').value = '';
            } else {
                alert('영어 단어와 뜻을 입력하세요.');
            }
        }

        function loadWords() {
            onValue(wordsRef, (snapshot) => {
                var wordsList = document.getElementById('words');
                wordsList.innerHTML = '';

                if (!snapshot.exists()) {
                    wordsList.innerHTML = `
                        <tr class="empty-row">
                            <td colspan="7">아직 저장된 단어가 없습니다.</td>
                        </tr>
                    `;
                    return;
                }

                let index = 1;
                snapshot.forEach((childSnapshot) => {
                    var wordItem = childSnapshot.val();
                    var key = childSnapshot.key;
                    var row = document.createElement('tr');
                    row.className = wordItem.memorized ? 'memorized hidden' : '';
                    row.innerHTML = `
                        <td><input type="checkbox" ${wordItem.memorized ? 'checked' : ''} onclick="toggleMemorizedStatus('${key}')"></td>
                        <td>${index}</td>
                        <td>${escapeHtml(wordItem.date)}</td>
                        <td>${escapeHtml(wordItem.word)}</td>
                        <td>${escapeHtml(wordItem.meaning)}</td>
                        <td>${escapeHtml(wordItem.example || '')}</td>
                        <td>
                            <div class="row-actions">
                                <button class="secondary-button" onclick="editWord('${key}')">수정</button>
                                <button class="danger-button" onclick="deleteWord('${key}')">삭제</button>
                            </div>
                        </td>
                    `;
                    wordsList.appendChild(row);
                    index++;
                });
            });
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function editWord(key) {
            const wordRef = ref(database, `words/${key}`);
            onValue(wordRef, (snapshot) => {
                const wordItem = snapshot.val();
                document.getElementById('editIndex').value = key;
                document.getElementById('editWordInput').value = wordItem.word;
                document.getElementById('editMeaningInput').value = wordItem.meaning;
                document.getElementById('editExampleInput').value = wordItem.example || '';

                document.getElementById('addWord').style.display = 'none';
                document.getElementById('editWord').style.display = 'block';
            }, { onlyOnce: true });
        }

        function saveEditedWord() {
            var key = document.getElementById('editIndex').value;
            var editedWord = document.getElementById('editWordInput').value.trim();
            var editedMeaning = document.getElementById('editMeaningInput').value.trim();
            var editedExample = document.getElementById('editExampleInput').value.trim();

            if (editedWord && editedMeaning) {
                const wordRef = ref(database, `words/${key}`);
                set(wordRef, {
                    word: editedWord,
                    meaning: editedMeaning,
                    example: editedExample,
                    date: getCurrentDate(),
                    memorized: false
                });
                cancelEdit();
            } else {
                alert('영어 단어와 뜻을 입력하세요.');
            }
        }

        function deleteWord(key) {
            const wordRef = ref(database, `words/${key}`);
            remove(wordRef);
        }

        function toggleMemorizedStatus(key) {
            const wordRef = ref(database, `words/${key}`);
            onValue(wordRef, (snapshot) => {
                const wordItem = snapshot.val();
                set(wordRef, { ...wordItem, memorized: !wordItem.memorized });
            }, { onlyOnce: true });
        }

        function getCurrentDate() {
            var today = new Date();
            var year = today.getFullYear();
            var month = String(today.getMonth() + 1).padStart(2, '0');
            var day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function cancelEdit() {
            document.getElementById('editWord').style.display = 'none';
            document.getElementById('addWord').style.display = 'block';
            document.getElementById('editIndex').value = '';
            document.getElementById('editWordInput').value = '';
            document.getElementById('editMeaningInput').value = '';
            document.getElementById('editExampleInput').value = '';
        }

        function toggleMemorized() {
            var rows = document.querySelectorAll('tr.memorized');
            rows.forEach(row => {
                row.classList.toggle('hidden');
            });
        }

        document.addEventListener('DOMContentLoaded', loadWords);

        window.addWord = addWord;
        window.editWord = editWord;
        window.saveEditedWord = saveEditedWord;
        window.deleteWord = deleteWord;
        window.toggleMemorizedStatus = toggleMemorizedStatus;
        window.cancelEdit = cancelEdit;
        window.toggleMemorized = toggleMemorized;
    </script>
</body>
</html>
